<section class="progress-view">
  <h1>Run Progress</h1>

  <p class="run-id" *ngIf="runId">Run ID: {{ runId }}</p>

  <div class="status-badge" [attr.data-status]="status" *ngIf="status">
    Status: <strong>{{ status }}</strong>
  </div>

  <div class="error-banner" role="alert" *ngIf="errorMessage">
    <strong>Error:</strong> {{ errorMessage }}
  </div>

  <div class="spinner" aria-label="Loading" *ngIf="isRunning && events.length === 0">
    Waiting for events&hellip;
  </div>

  <ol class="event-timeline" *ngIf="events.length > 0">
    <li
      *ngFor="let event of events"
      class="event-item"
      [class.event-error]="event.type === 'error'"
      [class.event-complete]="event.type === 'complete'"
      [attr.data-type]="event.type"
    >
      <span class="event-type">{{ event.type }}</span>
      <span class="event-message">{{ event.message }}</span>
    </li>
  </ol>
</section>
